{% extends "base.html" %}

{% block title %}{{ event.title }} - Association Jésus Miséricordieux{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <img src="{{ event.image.url }}" class="img-fluid rounded mb-4" alt="{{ event.title }}">
            <h1>{{ event.title }}</h1>
            <p class="text-muted mb-4"><small>{{ event.date|date:"d M Y" }}</small></p>
            <div class="content">
                <p>{{ event.description }}</p>
            </div>
            <a href="{% url 'events' %}" class="btn btn-outline-secondary mt-3">Retour aux événements</a>
        </div>
    </div>
</div>
{% endblock %}
